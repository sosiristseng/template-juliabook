# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  title: Julia Book
  github: https://github.com/sosiristseng/template-juliabook
  description: Publish Julia Notebooks via Jupyter Book
  # keywords: []
  authors: ["Wen-Wei Tseng"]
  license:
    code: MIT
    content: CC-BY-4.0
  open_access: true
  settings:
    output_matplotlib_strings: remove
  bibliography:
    - references.bib
  # To autogenerate a Table of Contents, run "jupyter book init --write-toc"
  # https://mystmd.org/guide/table-of-contents
  toc:
    - file: index.md
    - pattern: "*.ipynb"
    - title: Sub
      children:
        - pattern: sub/*.ipynb

site:
  title: JuliaBook Template
  template: book-theme
  options:
    folders: true
    logo_text: "JuliaBook Template"
  favicon: favicon.ico
  # logo: site_logo.png
  # style: ./my-style.css
  nav: []
